<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AI Image Quick Tool - Test Version</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        .box { background: #333; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 250px; border-radius: 5px; border: none; outline: none; }
        button { padding: 12px 25px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #000; transition: 0.3s; }
        button:hover { background: #009dbd; }
        #result { margin-top: 20px; width: 400px; height: 400px; background: #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px dashed #555; }
        img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🎨 ตัวทดสอบสร้างรูป</h2>
        <input type="text" id="prompt" placeholder="พิมพ์อะไรก็ได้ เช่น cat, dog">
        <button onclick="generate()">ลองรัน ✨</button>
        
        <div id="result">
            <p id="status">รูปจะแสดงตรงนี้ครับ</p>
        </div>
    </div>

    <script>
        function generate() {
            const prompt = document.getElementById('prompt').value;
            const resultDiv = document.getElementById('result');

            if (!prompt) return alert("กรุณาพิมพ์ข้อความก่อน!");

            // แสดงสถานะระหว่างโหลด
            resultDiv.innerHTML = `<p style="color:#00d4ff;">กำลังโหลดรูปภาพ...</p>`;
            
            // ใช้ Lorem Picsum เป็นที่ดึงรูปทดสอบ (เสถียรที่สุด)
            // เราสุ่มรูปใหม่ทุกครั้งด้วยการใส่ค่าเลขสุ่ม (seed) ต่อท้าย
            const randomID = Math.floor(Math.random() * 1000);
            const imageUrl = `https://picsum.photos{randomID}/1024/1024`;

            // สร้างรูป
            const img = new Image();
            img.src = imageUrl;
            
            img.onload = () => {
                resultDiv.innerHTML = `<img src="${imageUrl}">`;
            };

            img.onerror = () => {
                resultDiv.innerHTML = `<p style="color:red;">ไม่สามารถโหลดรูปได้ ลองเปลี่ยนเน็ตดูครับ</p>`;
            };
        }
    </script>

</body>
</html>
