<!DOCTYPE html>
<html>
<head>
    <title>ลองเรียก API ครั้งแรก</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        #dog-container { margin: 20px auto; width: 300px; height: 300px; background: #ddd; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { width: 100%; height: 100%; object-fit: cover; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #ff6b81; }
        .loading-text { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1>🐶 สุ่มรูปน้องหมาด้วย API</h1>
    
    <div id="dog-container">
        <!-- รูปภาพจะมาโผล่ตรงนี้ -->
        <p class="loading-text">กดปุ่มข้างล่างเพื่อเรียกข้อมูล</p>
    </div>

    <br>
    <button onclick="getDog()">เรียกน้องหมามา! ✨</button>

    <script>
        // ฟังก์ชันหลักในการเรียกใช้ API
        function getDog() {
            const container = document.getElementById('dog-container');
            container.innerHTML = '<p class="loading-text">กำลังวิ่งไปหยิบรูป...</p>';

            // 1. ใช้คำสั่ง fetch เพื่อส่ง "บริกร" ไปที่ครัว (URL ของ API)
            fetch('https://dog.ceo/api/breeds/image/random') 
                .then(response => {
                    // 2. เมื่อได้รับคำตอบ ให้แปลงข้อมูลเป็นรูปแบบ JSON (ที่ JS อ่านออก)
                    return response.json(); 
                })
                .then(data => {
                    // 3. นำข้อมูลที่ได้ (data.message คือ URL ของรูป) มาโชว์บนหน้าเว็บ
                    container.innerHTML = `<img src="${data.message}" alt="Random Dog">`;
                    console.log("ข้อมูลที่ API ส่งมาให้:", data);
                })
                .catch(error => {
                    // หากเกิดข้อผิดพลาด (เช่น เน็ตหลุด) ให้แจ้งเตือน
                    console.error("เกิดข้อผิดพลาด:", error);
                    container.innerHTML = '<p style="color:red;">อุ๊ย! ดึงข้อมูลไม่ได้ ลองใหม่อีกครั้งนะ</p>';
                });
        }
    </script>

</body>
</html>
