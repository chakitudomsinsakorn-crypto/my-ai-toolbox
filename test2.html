<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Image Test</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 15px; display: inline-block; width: 350px; border: 1px solid #444; }
        input { width: 250px; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #image-box { width: 300px; height: 300px; background: #000; margin: 20px auto; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🎨 ตัวทดสอบ (ต้องออก 100%)</h3>
        <input type="text" id="word" placeholder="พิมพ์ภาษาอังกฤษ เช่น car, cat">
        <button onclick="showImage()">ดูรูป ✨</button>
        
        <div id="image-box">
            <p id="status">รอพิมพ์คำสั่ง...</p>
        </div>
    </div>

    <script>
        function showImage() {
            const word = document.getElementById('word').value;
            const box = document.getElementById('image-box');
            
            if (!word) return alert("กรุณาพิมพ์ข้อความ!");

            box.innerHTML = "กำลังโหลด...";

            // ใช้ Source Unsplash (ตัวนี้เสถียรที่สุดในโลกตัวหนึ่ง ไม่โดนบล็อกง่ายๆ)
            const imgUrl = "https://images.unsplash.com"; 
            // หมายเหตุ: บรรทัดบนคือรูปตัวอย่าง ถ้าอยากให้เปลี่ยนตามคำพิมพ์ ให้ใช้บรรทัดล่างแทน
            const dynamicUrl = "https://source.unsplash.com?" + encodeURIComponent(word) + "&sig=" + Math.random();

            const img = new Image();
            img.src = dynamicUrl;
            
            img.onload = function() {
                box.innerHTML = '<img src="' + dynamicUrl + '">';
            };

            img.onerror = function() {
                box.innerHTML = "โหลดไม่ได้! ลองเปิดใน Chrome แทนแอปนี้นะครับ";
            };
        }
    </script>

</body>
</html>
