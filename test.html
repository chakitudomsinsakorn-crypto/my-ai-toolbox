<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Image Tool</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 20px; display: inline-block; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 12px; border-radius: 10px; border: none; margin-bottom: 15px; font-size: 16px; }
        button { width: 85%; padding: 12px; background: #00d4ff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        #image-container { margin-top: 20px; width: 100%; min-height: 300px; background: #000; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        img { width: 100%; display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>✨ AI สร้างรูปด่วน</h2>
        <input type="text" id="userInput" placeholder="พิมพ์ภาษาอังกฤษ (เช่น cute cat)">
        <button onclick="drawNow()">สร้างรูปเดี๋ยวนี้!</button>
        
        <div id="image-container">
            <p id="msg">พิมพ์คำสั่งแล้วกดปุ่มเลย</p>
        </div>
    </div>

    <script>
        function drawNow() {
            const text = document.getElementById('userInput').value;
            const container = document.getElementById('image-container');
            
            if (!text) return alert("พิมพ์อะไรบางอย่างก่อนนะ!");

            container.innerHTML = "<p style='color:#00d4ff'>AI กำลังวาด... รอสักครู่</p>";
            
            // ใช้ URL รูปแบบที่เสถียรที่สุดของ Pollinations
            const seed = Math.floor(Math.random() * 1000);
            const aiUrl = "https://image.pollinations.ai" + encodeURIComponent(text) + "?width=1024&height=1024&seed=" + seed + "&nologo=true";

            // ใช้เทคนิคเปลี่ยน src ของ <img> โดยตรงเพื่อลดโอกาสโดนบล็อก
            const newImg = new Image();
            newImg.src = aiUrl;
            
            newImg.onload = function() {
                container.innerHTML = '<img src="' + aiUrl + '">';
            };

            newImg.onerror = function() {
                container.innerHTML = "<p style='color:#ff4d4d; padding:10px;'>แอปของคุณบล็อกการโหลดรูป!<br><a href='"+aiUrl+"' style='color:#00d4ff'>คลิกเพื่อดูรูปตรงๆ</a></p>";
            };
        }
    </script>

</body>
</html>
